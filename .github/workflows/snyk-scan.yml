name: Snyk Scan

on:
  pull_request:
    branches:
      - master
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  pull-requests: read

jobs:
  snyk-aggregate-test:
    name: Snyk Aggregate Project Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk aggregate project test (parent-pom + JDBC + FIPS modules)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk test --maven-aggregate-project --file=parent-pom.xml --package-manager=maven

      - name: Run Snyk test for TestOnly
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk test --file=TestOnly/pom.xml --package-manager=maven

      - name: Run Snyk test for fat-jar-test-app
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk test --file=fat-jar-test-app/pom.xml --package-manager=maven

      - name: Run Snyk test for ci/wif/aws-lambda
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk test --file=ci/wif/aws-lambda/pom.xml --package-manager=maven

      - name: Run Snyk test for ci/wif/azure-function
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk test --file=ci/wif/azure-function/pom.xml --package-manager=maven

      - name: Run Snyk test for ci/wif/gcp-function
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk test --file=ci/wif/gcp-function/pom.xml --package-manager=maven

  snyk-parent-pom-test:
    name: Snyk Parent POM Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk parent-pom test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk test --file=parent-pom.xml --package-manager=maven

  snyk-public-pom-test:
    name: Snyk Public POM Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk public-pom test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk test --file=public_pom.xml --package-manager=maven

  snyk-thin-public-pom-test:
    name: Snyk Thin Public POM Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk thin-public-pom test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk test --file=thin_public_pom.xml --package-manager=maven

  snyk-fips-public-pom-test:
    name: Snyk FIPS Public POM Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk FIPS public-pom test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk test --file=FIPS/public_pom.xml --package-manager=maven

  snyk-monitor:
    name: Snyk Monitor
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@master

      - name: Snyk monitor aggregate (parent-pom + JDBC + FIPS modules)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk monitor --maven-aggregate-project --file=parent-pom.xml --package-manager=maven --project-name=snowflakedb/jdbc

      - name: Snyk monitor TestOnly
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk monitor --file=TestOnly/pom.xml --package-manager=maven --project-name=snowflakedb/jdbc

      - name: Snyk monitor fat-jar-test-app
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk monitor --file=fat-jar-test-app/pom.xml --package-manager=maven --project-name=snowflakedb/jdbc

      - name: Snyk monitor ci/wif/aws-lambda
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk monitor --file=ci/wif/aws-lambda/pom.xml --package-manager=maven --project-name=snowflakedb/jdbc

      - name: Snyk monitor ci/wif/azure-function
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk monitor --file=ci/wif/azure-function/pom.xml --package-manager=maven --project-name=snowflakedb/jdbc

      - name: Snyk monitor ci/wif/gcp-function
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk monitor --file=ci/wif/gcp-function/pom.xml --package-manager=maven --project-name=snowflakedb/jdbc

      - name: Snyk monitor parent-pom
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk monitor --file=parent-pom.xml --package-manager=maven --project-name=snowflakedb/jdbc

      - name: Snyk monitor public-pom
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk monitor --file=public_pom.xml --package-manager=maven --project-name=snowflakedb/jdbc

      - name: Snyk monitor thin-public-pom
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk monitor --file=thin_public_pom.xml --package-manager=maven --project-name=snowflakedb/jdbc

      - name: Snyk monitor FIPS public-pom
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN_TEST }}
          SNYK_CFG_ORG: ${{ secrets.SNYK_ORG_ID_PUBLIC_REPO }}
        run: snyk monitor --file=FIPS/public_pom.xml --package-manager=maven --project-name=snowflakedb/jdbc
